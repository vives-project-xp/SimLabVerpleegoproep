<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="discription" content="Oproepsysteem_verpleegkunde">
    <meta name="keywords" content="Oproepsysteem,verpleegkunde,Vives">
    <meta name="author" content="Cobe Dudal">
    <title>Oproepsysteem</title>

    <script defer src="./resources/js/script.js"></script>
    <link rel="stylesheet" href="./resources/css/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
    <div class="header-block">
        <img src="./resources/images/logo.svg" alt="Vives logo">
        <h1 class="header-block">Ziekenhuis monitor</h1>
        <p>Kamer status dashboard</p>
    </div><br>

    <div class="overview">
        <table class="overview">
            <tr class="overview">
                <th>Hulp gevraagd</th><th>Collega aanwezig</th><th>Lage batterij</th>
            </tr>
            <tr>
                <td>1</td><td>1</td><td>1</td>
            </tr>
        </table>
    </div>

    <div class="card-container">
        <div class="card free">
            <p class="battery"><i class="fa-solid fa-battery-full"></i> 100%</p>
            <p class="room-name">Kamer 01</p>
            <p><i class="fa-solid fa-circle-check" style="color: rgb(6, 158, 16);"></i> Geen melding</p>
        </div>
        <div class="card busy">
            <p class="battery"><i class="fa-solid fa-battery-three-quarters"></i> 75%</p>
            <p class="room-name">Kamer 02</p>
            <p><i class="fa-solid fa-user" style="color: rgb(237, 136, 12);"></i> Collega aanwezig</p>
        </div>
        <div class="card alert">
            <p class="battery"><i class="fa-solid fa-battery-quarter"></i> 25%</p>
            <p class="room-name">Kamer 03</p>
            <p><i class="fa-solid fa-circle-xmark" style="color: rgb(213, 13, 13);"></i> Hulp gevraagd</p>
        </div>
    </div>

    <div class="overview">
        <p class="overview">Geen hulp <i class="fa-solid fa-square" style="color: rgb(6, 158, 16);"></i>
            Collega aanwezig <i class="fa-solid fa-square" style="color: rgb(237, 136, 12);"></i>
            Hulp gevraagd <i class="fa-solid fa-square" style="color: rgb(213, 13, 13);"></i></p>
    </div>
</body>

</html>
