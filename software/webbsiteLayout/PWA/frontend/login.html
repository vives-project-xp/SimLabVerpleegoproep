<!DOCTYPE html>
<html lang="nl">

<head>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SimLab">
    <link rel="icon" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oproepsysteem</title>

    <script defer src="resources/js/login.js?v=20260423-002"></script>
    <link rel="stylesheet" href="resources/css/stylesheet.css?v=20260423-004">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>

    <div class="page-bg"></div>

    <main class="login-page">
        <section class="login-card">

            <div class="login-icon-wrap">
                <i class="fa-solid fa-user-lock login-icon"></i>
            </div>

            <h1 class="login-title">Aanmelden</h1>
            <p class="login-subtitle">Log in om het dashboard te openen</p>

            <form id="loginForm" class="login-form">
                <label class="login-label" for="username">Gebruikersnaam</label>
                <input id="username" name="username" class="login-input" type="text" autocomplete="username" required>

                <label class="login-label" for="password">Wachtwoord</label>
                <input id="password" name="password" class="login-input" type="password" autocomplete="current-password" required>

                <div id="loginError" class="login-error"></div>

                <button type="submit" class="login-button">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Inloggen
                </button>
            </form>

        </section>
    </main>

</body>
</html>
